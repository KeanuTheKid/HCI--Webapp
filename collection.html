<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>Sammlung – Helmet Through Time</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="phone">

    <div class="topbar">
      <a class="back-btn" href="index.html">‹</a>
      Helmet Through Time
    </div>

    <section class="content">

      <div class="title-card">Feuerwehr-Objekte</div>

      <p class="hint">
        Wähle ein Objekt aus und öffne es in AR auf deinem iPhone.
      </p>

      <div class="list" id="list"></div>

    </section>

    <div class="homebar"></div>
  </main>

  <script src="app-data.js"></script>
  <script>
    list.innerHTML = ITEMS.map((item) => `
      <a class="card" href="detail.html?id=${item.slug}">
        <span class="thumb" style="background:${item.color}22">
          <img src="${item.image}" alt="${item.title}">
        </span>
        <span class="card-text">
          <h3>${item.title}</h3>
          <p>In AR ansehen →</p>
        </span>
      </a>
    `).join("");
  </script>
</body>
</html>
